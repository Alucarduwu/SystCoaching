<article 
  class="group relative bg-[#0a0a0a] border border-white/5 rounded-xl p-5 hover:bg-[#111111] transition-all duration-300 flex flex-col min-h-[140px] shadow-xl active:scale-[0.98] animate-in fade-in slide-in-from-bottom-2 duration-500 overflow-hidden">
  
  <!-- Header: Icon & Category -->
  <div class="flex items-center justify-between mb-4 relative z-10">
    <div class="w-10 h-10 rounded-lg bg-[#ef4444]/10 border border-white/5 flex items-center justify-center text-2xl group-hover:bg-[#ef4444] transition-all duration-300 shadow-inner">
      <span>{{ food.icono || '🍲' }}</span>
    </div>
    <div class="px-2 py-0.5 bg-[#ef4444]/5 border border-[#ef4444]/20 rounded-md">
      <span class="text-[8px] font-black text-[#ef4444] uppercase tracking-widest leading-none">{{ food.categoria || 'GRAL' }}</span>
    </div>
  </div>

  <!-- Title -->
  <h3 class="text-base font-black text-white uppercase tracking-tight leading-none mb-4 group-hover:text-[#ef4444] transition-colors truncate relative z-10">
    {{ food.nombre }}
  </h3>

  <!-- Macros Compact Row -->
  <div class="flex items-center gap-4 mb-4 relative z-10 p-3 bg-white/[0.01] border border-white/5 rounded-lg">
    <div class="flex flex-col gap-1">
      <span class="text-[7px] font-black text-slate-600 uppercase tracking-widest leading-none">Kcal</span>
      <span class="text-[12px] font-bold text-white leading-none">{{ displayKcal }}</span>
    </div>
    <div class="w-px h-5 bg-white/5"></div>
    <div class="flex flex-col gap-1">
      <span class="text-[7px] font-black text-red-500 uppercase tracking-widest leading-none">Prot</span>
      <span class="text-[12px] font-bold text-red-500/80 leading-none">{{ food.proteina_100g || food.proteina || 0 }}g</span>
    </div>
    <div class="flex flex-col gap-1">
      <span class="text-[7px] font-black text-cyan-500 uppercase tracking-widest leading-none">Carb</span>
      <span class="text-[12px] font-bold text-cyan-500/80 leading-none">{{ food.carbohidratos_100g || food.carbohidratos || 0 }}g</span>
    </div>
    <div class="flex flex-col gap-1">
      <span class="text-[7px] font-black text-orange-500 uppercase tracking-widest leading-none">Gras</span>
      <span class="text-[12px] font-bold text-orange-500/80 leading-none">{{ food.grasas_100g || food.grasas || 0 }}g</span>
    </div>
  </div>

  <!-- Footer (Visible on Hover) -->
  <footer class="mt-auto pt-3 border-t border-white/5 flex items-center justify-between opacity-0 group-hover:opacity-100 transition-all duration-500 relative z-10">
    <span class="text-[8px] font-black text-slate-700 uppercase tracking-widest">REF: {{ food.id }}</span>
    <div class="flex items-center gap-2">
      <button (click)="edit.emit($event)" class="w-7 h-7 rounded-lg bg-white/5 border border-white/5 text-slate-500 hover:text-white transition-all flex items-center justify-center">
         <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/></svg>
      </button>
      <button (click)="delete.emit($event)" class="w-7 h-7 rounded-lg bg-white/5 border border-white/5 text-slate-500 hover:text-[#ef4444] transition-all flex items-center justify-center">
         <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/></svg>
      </button>
    </div>
  </footer>
</article>
